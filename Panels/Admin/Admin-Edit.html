        <!-- Main Content -->
        <div class="container my-5">
            <form>
                <form class="form-control">
                    <div class="row">
                        <div class=" col-md-6">
                            <label class="form-label" for="name">نام و نام خانوادگی</label>
                            <input class="C-input text-start" id="name" name="name" type="text"
                                   placeholder="ممد جعفرزاده" required>
                        </div>
                        <div class=" col-md-6">
                            <label class="form-label" for="tel">شماره تلفن</label>
                            <input class="C-input" id="tel" name="tel" type="tel" placeholder="09123456789" required>
                        </div>
                        <div class=" col-md-6 mt-3">
                            <label class="form-label" for="email">ایمیل</label>
                            <input class="C-input" id="email" name="email" type="email" placeholder="example@email.com"
                                   required>
                        </div>
                        <div class=" col-md-6 mt-3">
                            <div class="d-flex justify-content-between">
                                <label class="form-label" for="password">رمز عبور</label>
                                <div>
                                    <label class="form-label" for="toggle-admin-view">نمایش رمز</label>
                                    <input class="form-check-input" type="checkbox" name="Show-pass"
                                           id="toggle-admin-view">
                                </div>
                            </div>
                            <input class="C-input text-end" id="password" name="password" type="password"
                                   placeholder="Aa-Zz,1-9"
                                   oninput="this.value = this.value.replace(/[^A-Za-z0-9]/g, '')" required>
                        </div>
                    </div>
                </form>
                <button type="submit" class="btn btn-primary d-block w-100 mt-4">ثبت ویرایش</button>
            </form>

<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" href="../../src/css/bootstrap.rtl.min.css"/>
    <link rel="stylesheet" href="../../src/css/style.css" type="text/css"/>
    <link rel="stylesheet" href="../../src/css/admin.css"/>
    <link
            href="https://lib.arvancloud.ir/font-awesome/6.3.0/css/all.css"
            rel="stylesheet"
    />
    <link href="../../src/img/ico.png" rel="icon"/>
    <title>پنل شخصی-دانلود فایل</title>
</head>
<body class="bg-secondary-subtle">
<!--Side-Bar-Btn-->
<nav class="navbar navbar-dark bg-secondary navbar-expand-xxl d-xxl-none px-3">
    <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="offcanvas"
            data-bs-target="#sidebar"
    >
        <span class="navbar-toggler-icon"></span>
    </button>
</nav>
<div class="container-fluid">
    <!-- Side-Bar -->
    <div class="row">
        <div
                class="offcanvas-xxl offcanvas-start bg-secondary text-white"
                tabindex="-1"
                id="sidebar"
        >
            <div class="offcanvas-header d-md-none">
                <h5 class="offcanvas-title">منو</h5>
                <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas"></button>
            </div>
            <div class="offcanvas-body p-3">
                <ul class="navbar-nav">
                    <h5 class="text-light p-3 text-center">پنل مدیریت</h5>
                    <li class="nav-item">
                        <a href="./T-Offline-Courses.html" class=" text-start btn my-1 btn-outline-light py-2 w-100 ">
                            بازگشت به صفحه قبلی
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="./T-Courses.html" class=" text-start btn my-1 btn-outline-light py-2 w-100 ">
                            دوره ها
                        </a>
                    </li>

                    <li class="nav-item">
                        <a href="./T-Articles.html" class=" text-start btn my-1 btn-outline-light py-2 w-100 ">
                            مقالات
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="./T-Offline-Courses.html"
                           class=" text-start btn my-1 btn-outline-light py-2 w-100 active">
                            فایل های قابل دانلود
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="./T-Notifs.html" class=" text-start btn my-1 btn-outline-light py-2 borde w-100 ">
                            اعلانات
                        </a>
                    </li>
                    <li class="nav-item">
                        <button class="btn my-1 btn-danger text-light w-100 ">
                            خروج
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="col-md-10 offset-md-2 p-4">
        <form class="form-control">
            <label for="file" class="form-label">فایل</label>
            <input class="C-input" id="file" name="file" type="file" placeholder="Your File" required>
            <label class="form-label" for="title">عنوان</label>
            <input class="C-input" id="title" name="title" type="text" placeholder="عنوان مورد نظر" required>
            <label class="form-label" for="lesson">درس</label>
            <input class="C-input" id="lesson" name="lesson" type="text" placeholder="نام درس" required>
            <label class="form-label" for="Teacher">مدرس</label>
            <input class="C-input" id="Teacher" name="Teacher" type="text" placeholder="نام مدرس" required>
            <label class="form-label" for="money">هزینه</label>
            <input class="C-input" id="money" name="money" type="text" placeholder="هزینه مورد نیاز" required>
            <button type="submit" class="btn btn-primary w-100 mt-4" id="submitBtn">
                ثبت‌
            </button>
        </form>
    </div>

</div>
<!-- Scripts -->
<script src="../../src/js/bootstrap.bundle.min.js"></script>
<script src="../../src/js/admin.js"></script>
<script src="../../src/js/script.js"></script>
</body>
</html>
